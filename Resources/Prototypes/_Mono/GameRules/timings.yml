- type: entity
  id: RoundEndRuleHour3
  parent: BaseGameRule
  components:
  - type: RoundEndTimeRule
    endAt: 10800 # 3 hour

- type: entity
  id: PortstrikeAnnounceRuleHour3 # LuaM: PortstrikeAnnounceRuleHour4 > PortstrikeAnnounceRuleHour3
  parent: BaseGameRule
  components:
  - type: GameRule
    delay:
      min: 10800 # LuaM: 14400 > 10800
      max: 10800 # LuaM: 14400 > 10800
  - type: BlankRule
  - type: StationEvent
    earliestStart: 0
    endAnnouncement: gamerule-portstrike-announce-announcement
    announceSender: gamerule-portstrike-announce-sender
    endAnnouncementColor: "#6B8E23" # LuaM
    endAudio:
      path: /Audio/_LuaM/Music/running_in.ogg # LuaM: /Audio/Misc/gamma.ogg > /Audio/_LuaM/Music/running_in.ogg
      params:
        volume: -1

- type: entity
  id: PortstrikeAnnounceRuleHour1
  parent: PortstrikeAnnounceRuleHour3 # LuaM: PortstrikeAnnounceRuleHour4 > PortstrikeAnnounceRuleHour3
  components:
  - type: GameRule
    delay:
      min: 3600
      max: 3600

# debug rules
- type: entity
  id: RoundEndRuleMinute2
  parent: BaseGameRule
  components:
  - type: RoundEndTimeRule
    endAt: 120

- type: entity
  id: PortstrikeAnnounceRuleSeconds20
  parent: PortstrikeAnnounceRuleHour3 # LuaM: PortstrikeAnnounceRuleHour4 > PortstrikeAnnounceRuleHour3
  components:
  - type: GameRule
    delay:
      min: 20
      max: 20
