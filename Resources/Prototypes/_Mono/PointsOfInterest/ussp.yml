- type: pointOfInterest
  id: USSPCamelot
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Станция «Камелот»' # LuaM: 'Camelot Station' > 'Станция «Камелот»'
  minimumDistance: 8000 # LuaM 10650 > 8000
  maximumDistance: 9000 # LuaM 12400 > 9000
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueUSSP, MonoTSFUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ]
  spawnGroup: Required
  gridPath: /Maps/_LuaM/POI/camelotLuaM.yml # LuaM: /Maps/_Mono/POI/camelot.yml -> /Maps/_LuaM/POI/camelotLuaM.yml
  addComponents:
  - type: IFF
    color: "#ccaa55"

- type: gameMap
  id: USSPCamelot
  mapName: 'Camelot Station'
  mapPath: /Maps/_LuaM/POI/camelotLuaM.yml # LuaM: /Maps/_Mono/POI/camelot.yml -> /Maps/_LuaM/POI/camelotLuaM.yml
  minPlayers: 0
  stations:
    USSPCamelot:
      stationProto: RecordsFrontierOutpostCargo
      gridComponents:
        - type: VesselMusic
          ambientMusicPrototype: CamelotMusic
        - type: VesselInfo
          description: "A rickety old station once owned by a now decrepit interstellar power. Cold and dark."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Camelot Station'
        - type: ExtraStationInformation
          icon:
            sprite: _NF/Structures/Storage/Crates/secure_ammo.rsi
            state: icon
          stationSubtext: 'frontier-lobby-camelot-subtext'
          stationDescription: 'frontier-lobby-camelot-description'
          lobbySortOrder: 4
        - type: StationJobs
          availableJobs:
            # USSPCommissar: [1, 1]
            # USSPSergeant: [4, 4]
            # USSPCorporal: [6, 6]
            # USSPMedic: [4, 4]
            # USSPRifleman: [-1, -1]
            Contractor: [-1, -1]
            Pilot: [0, -1]
            Mercenary: [0, -1]
          tags:
          - USSPCommand
        - type: StationDeadDrop
          maxDeadDrops: 2 # Fewer here, players start here.
