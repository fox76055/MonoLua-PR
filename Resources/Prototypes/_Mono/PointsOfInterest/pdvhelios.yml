- type: pointOfInterest
  id: HeliosFortress
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Крепость «Гелиос»' # LuaM: 'PDV Helios Fortress' > 'Крепость «Гелиос»'
  minimumDistance: 8500 # LuaM 7500 > 8500
  maximumDistance: 9500
  spawnGamePreset: [ NFAdventure, NFPirate, MonoStandard, MonoRogueTSF, MonoRogueUSSP, MonoADS, MonoChimera, MonoMixed, MonoAllAtOnce ]
  spawnGroup: Required
  gridPath: /Maps/_LuaM/POI/HeliosLuaM.yml #LuaM: /Maps/_Mono/POI/pdvhelios.yml -> /Maps/_LuaM/POI/heliosLuaM.yml
  addComponents:
  - type: IFF
    color: "#c21010" # LuaM: DE9E59 > c21010
    readOnly: true # mono

- type: gameMap
  id: HeliosFortress
  mapName: 'PDV Helio Fortress'
  mapPath: /Maps/_LuaM/POI/HeliosLuaM.yml #LuaM: /Maps/_Mono/POI/pdvhelios.yml -> /Maps/_LuaM/POI/heliosLuaM.yml
  minPlayers: 0
  stations:
    HeliosFortress:
      stationProto: RecordsFrontierOutpostCargo
      gridComponents:
      - type: VesselInfo
        description: "An oppressive imperial aura lurks here. Glory to the Sultan."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'PDV Helio Fortress'
        - type: ExtraStationInformation
          icon: /Textures/_NF/Interface/Pirate/piratelogo.png
          stationSubtext: 'frontier-lobby-pirate-subtext'
          stationDescription: 'frontier-lobby-pirate-description'
        - type: StationJobs
          availableJobs:
            PirateCaptain: [ 1, 1 ]
            PirateFirstMate: [ 1, 1 ]
            PDVDenasvar: [ 3, 3 ]
            PDVInfiltrator: [ 1, 1 ] # LuaM: [ 2, 2 ] > [ 1, 1 ]
            Pirate: [ -1, -1 ]
            PdvBorg: [ 2, 2 ]
          tags:
          - GrandVizier
        - type: StationDeadDropReporting
          messageSet: Pirate
        - type: StationDeadDropHintExempt
