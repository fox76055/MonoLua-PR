#Empty ADM
- type: entity
  id: JetpackADM
  parent: BaseJetpack
  name: pre-fracture jetpack
  description: An exotic, pre-fracture stealth jetpack, rated to be invisible to radar beyond 16 meters.
  suffix: Empty
  components:
  - type: Item
    sprite: _Mono/Objects/Tanks/Jetpacks/purple.rsi
  - type: Sprite
    sprite: _Mono/Objects/Tanks/Jetpacks/purple.rsi
  - type: Clothing
    sprite: _Mono/Objects/Tanks/Jetpacks/purple.rsi
  - type: Jetpack
    detectionRange: 16
  # LuaM start
  - type: GasTank
    outputPressure: 5.0
    air:
      # 13 minutes of thrust
      volume: 50
  # LuaM end

#Filled ADM
- type: entity
  id: JetpackADMFilled
  parent: JetpackADM
  name: pre-fracture jetpack
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 5 # LuaM: 42.6 > 5
    air:
      # 13 minutes thrust
      volume: 50 # LuaM: 5 > 50
      temperature: 72.0 # LuaM: 293.15 > 72.0 Сжижка для боргов темка.
      moles:
        - 84.63 # oxygen # LuaM: 1.025689525 > 84.63
      # - 1.025689525 # nitrogen # LuaM commented
