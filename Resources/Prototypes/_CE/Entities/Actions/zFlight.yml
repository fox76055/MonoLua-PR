- type: entity
  id: CEActionZFlightUp
  name: Fly up
  description: Beat your wings and rise one Z-Level.
  components:
  - type: InstantAction
    checkCanInteract: false
    icon:
      sprite: _CE/Actions/zLevels.rsi
      state: up
    event: !type:CEZFlightActionUp

- type: entity
  id: CEActionZFlightDown
  name: Fly down
  description: Ease off and descend one Z-Level.
  components:
  - type: InstantAction
    checkCanInteract: false
    icon:
      sprite: _CE/Actions/zLevels.rsi
      state: down
    event: !type:CEZFlightActionDown

- type: entity
  id: CEActionZFlightToggle
  name: Toggle flight
  description: Take to the air, or set back down.
  components:
  - type: InstantAction
    checkCanInteract: false
    icon:
      sprite: _CE/Actions/zLevels.rsi
      state: toggle_flight
    iconOn:
      sprite: _CE/Actions/zLevels.rsi
      state: toggle_flight_on
    event: !type:ToggleActionEvent
